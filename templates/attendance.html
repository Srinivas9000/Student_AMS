<!DOCTYPE html>
<html>
<head>
    <title>Mark Attendance</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        /* Background Image */
        .attendance-bg{
            background-image: url("{% static 'images/report.png' %}");
            min-height: 100vh;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Overlay for better visibility */
        .overlay{
            background: rgba(255,255,255,0.9);
            min-height: 100vh;
            padding-bottom: 40px;
        }

        .card {
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .table thead {
            background-color: #212529;
            color: white;
        }

    </style>
</head>

<body>

<div class="attendance-bg">
<div class="overlay">

<div class="container pt-4">

    <h3 class="mb-4">📋 Mark Attendance</h3>

    <!-- Batch + Date Row -->
    <form method="GET">
        <div class="row mb-3">
            <div class="col-md-4">
                <select name="batch" class="form-select" onchange="this.form.submit()" required>
                    <option value="">Select Batch</option>
                    {% for batch in batches %}
                        <option value="{{ batch.id }}"
                        {% if selected_batch_id == batch.id|stringformat:"s" %}selected{% endif %}>
                            {{ batch.batch_name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-md-4">
                <input type="date"
                       name="date"
                       class="form-control"
                       value="{{ selected_date|date:'Y-m-d' }}"
                       onchange="this.form.submit()"
                       required>
            </div>
        </div>
    </form>

    {% if students %}
    <form method="POST">
        {% csrf_token %}

        <input type="hidden" name="batch" value="{{ selected_batch_id }}">
        <input type="hidden" name="date" value="{{ selected_date|date:'Y-m-d' }}">

        <div class="card p-3">
            <table class="table table-bordered text-center align-middle">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Date</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    {% for student in students %}
                    <tr>
                        <td>{{ student.name }}</td>
                        <td>{{ student.email }}</td>
                        <td>{{ student.phone_no }}</td>

                        <td>{{ selected_date|date:"M. d, Y" }}</td>

                        <td>
                            <div class="form-check form-switch d-flex justify-content-center">
                                <input class="form-check-input"
                                       type="checkbox"
                                       name="present_{{ student.id }}"
                                       {% if student.is_present %}checked{% endif %}>
                            </div>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <div class="mt-3">
            <button type="submit" class="btn btn-primary">Save Attendance</button>
            <a href="{% url 'dashboard' %}" class="btn btn-secondary">Back</a>
        </div>

    </form>
    {% endif %}

</div>

</div>
</div>

</body>
</html>
