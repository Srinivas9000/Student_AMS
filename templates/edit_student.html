{% extends "base.html" %}
{% block maincontent %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold text-warning mb-0">Edit Student</h3>

        <a href="{% url 'manage_students' %}" class="btn btn-outline-secondary">
            ← Back to Manage
        </a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <form method="POST">
                {% csrf_token %}

                <div class="row">
                    <div class="col-md-3 mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ student.name }}" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control"
                               value="{{ student.email }}" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Phone Number</label>
                        <input type="text" name="phone" class="form-control"
                               value="{{ student.phone_no }}" required>
                    </div>

                    <div class="col-md-3 mb-3">
                        <label class="form-label">Batch / Department</label>
                        <select name="batch" class="form-select" required>
                            {% for batch in batches %}
                                <option value="{{ batch.id }}"
                                    {% if student.batch.id == batch.id %}selected{% endif %}>
                                    {{ batch.department.name }} - {{ batch.batch_name }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-warning">
                    Update Student
                </button>

            </form>

        </div>
    </div>

</div>

{% endblock maincontent %}
