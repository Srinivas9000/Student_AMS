{% extends "base.html" %}
{% load static %}

{% block title %} Attendance | Register {% endblock %}

{% block maincontent %}

<style>
  /* Full screen background image */
  .register-bg {
    background-image: url("{% static 'images/register.jpeg' %}");
    height: 100vh;
    background-position: center;
    background-repeat: no-repeat;
    background-size: cover;

    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Registration card on image */
  .register-box {
    width: 420px;
    padding: 30px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.92); /* transparent white */
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
  }
</style>

<div class="register-bg">
  <div class="card register-box">
    <h3 class="text-center mb-4 fw-bold text-danger-emphasis">
      Teacher Registration
    </h3>

    {% if error %}
      <p class="text-danger text-center">{{ error }}</p>
    {% endif %}

    <form method="POST">
      {% csrf_token %}

      <div class="mb-3">
        <input
          type="text"
          name="name"
          class="form-control form-control-lg"
          placeholder="Full Name"
          required
        />
      </div>

      <div class="mb-3">
        <input
          type="email"
          name="email"
          class="form-control form-control-lg"
          placeholder="Email"
          required
        />
      </div>

      <div class="mb-3">
        <input
          type="password"
          name="password"
          class="form-control form-control-lg"
          placeholder="Password"
          required
        />
      </div>

      <div class="d-grid">
        <button type="submit" class="btn btn-success btn-lg fw-bold">
          Register
        </button>
      </div>

      <br />

      <div class="mb-3 text-center">
        Already have an account?
        <a href="{% url 'login' %}" class="text-danger fw-bold">Login</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
